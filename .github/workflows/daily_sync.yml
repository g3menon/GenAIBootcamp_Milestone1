name: Daily Data Sync

on:
  schedule:
    # 10:00 AM IST is 04:30 AM UTC
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Orchestrated Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: hdfc-mutual-funds
          EMBEDDING_MODEL: models/gemini-embedding-001
        run: |
          # Run the full pipeline from scrape to vector store sync
          python -m phase1.run_scraper
          python -m phase2.run_processor
          python -m phase3.run_vectorstore --rebuild
